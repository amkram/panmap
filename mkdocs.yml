site_name: panmap
site_description: Pangenome-based sequence placement, alignment, and genotyping
repo_url: https://github.com/TurakhiaLab/panmap
repo_name: TurakhiaLab/panmap

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true
  - attr_list

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quickstart.md
  - Single-Sample Mode: single-sample.md
  - Metagenomic Mode: metagenomic.md
  - CLI Reference: cli-reference.md
