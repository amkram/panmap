name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['*.md', 'docs/**']
  pull_request:
    branches: [main]
    paths-ignore: ['*.md', 'docs/**']

# One run per ref; cancel superseded runs to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# ccache: hash the compiler's *content*, not its mtime (the default). The conda
# toolchain is re-extracted whenever the env cache misses or environment.yml changes,
# giving identical compilers fresh mtimes -- which otherwise invalidates the entire
# ccache and drops build-test from ~100% to ~0% hits.
env:
  CCACHE_COMPILERCHECK: content

jobs:
  # Primary gate (every PR + push): build against conda libs — the bioconda
  # distribution path — and run the full unit + end-to-end suite. Fast because
  # conda ships prebuilt binary deps (no from-source capnp/htslib/protobuf).
  build-test:
    name: build & test (linux)
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          cache-environment: true
      - uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-ccache
          max-size: 500M
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DOPTION_BUILD_TESTS=ON -DOPTION_PORTABLE=ON
      - name: Build
        run: cmake --build build -j"$(nproc)"
      - name: Test
        run: ctest --test-dir build --output-on-failure -j"$(getconf _NPROCESSORS_ONLN)"

  # Guards the bioconda recipe's exact build path: the repo's own CMakeLists driven
  # with USE_SYSTEM_LIBS + an offline PANMAN_SOURCE_DIR (the recipe supplies panman as
  # a tarball, not via FetchContent). Keeps a CMakeLists change from silently breaking
  # the conda package while the primary gate (which FetchContents panman) stays green.
  bioconda-build:
    name: bioconda recipe build (linux)
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          cache-environment: true
      - uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-ccache-bioconda
          max-size: 500M
      - name: Supply panman as the recipe does (offline source dir, not FetchContent)
        run: |
          mkdir -p external/panman
          curl -fsSL https://github.com/TurakhiaLab/panman/archive/refs/tags/v0.1.4.tar.gz \
            | tar xz -C external/panman --strip-components=1
      - name: Configure + build (recipe invocation)
        run: |
          cmake -S . -B build-bioconda \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_SYSTEM_LIBS=ON \
            -DPANMAN_SOURCE_DIR="$PWD/external/panman" \
            -DOPTION_BUILD_TESTS=OFF \
            -DOPTION_BUILD_SIMULATE=OFF
          cmake --build build-bioconda -j"$(nproc)"
      - name: Smoke test
        run: ./build-bioconda/bin/panmap --version

  # Cross-platform safety net. macOS runners bill ~10x, so only on push to main.
  build-test-macos:
    name: build & test (macos)
    if: github.event_name == 'push'
    runs-on: macos-14
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          cache-environment: true
      - uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-ccache
          max-size: 500M
      - name: Configure
        # macOS runners are arm64 (Apple Silicon); OPTION_PORTABLE's -march=x86-64-v3
        # is x86-only. Homogeneous arm64 runners have no cross-CPU ccache-SIGILL issue,
        # so keep -march=native (OPTION_PORTABLE off) here. Portability matters only for
        # the heterogeneous x86 Linux runners.
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DOPTION_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build -j"$(sysctl -n hw.ncpu)"
      - name: Test
        run: ctest --test-dir build --output-on-failure -j"$(getconf _NPROCESSORS_ONLN)"

  # Validates the vendored from-source build path (USE_SYSTEM_LIBS=OFF) and the
  # shipped image -- the only job exercising that path. Push-to-main only, so it
  # never gates PRs (build-test + bioconda cover those). ccache on a BuildKit cache
  # mount (persisted by buildkit-cache-dance) + GHA layer cache keep it fast: the
  # from-source deps and unchanged objects come from cache; only changed .cpp rebuild.
  docker:
    name: docker build
    # Push-to-main only. It validates the USE_SYSTEM_LIBS=OFF from-source path (build-test
    # + bioconda cover PRs), and its GHA layer cache is large -- running it on PRs evicted
    # the build-test/bioconda ccaches from the shared 10GB pool (LRU), so a plain PR then
    # cold-rebuilt from scratch. Keeping it off PRs leaves those ccaches warm.
    if: github.event_name == 'push'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Restore docker ccache
        id: ccache
        uses: actions/cache@v4
        with:
          path: docker-ccache
          key: ${{ runner.os }}-docker-ccache-${{ github.sha }}
          restore-keys: ${{ runner.os }}-docker-ccache-
      - name: Inject ccache into the build
        uses: reproducible-containers/buildkit-cache-dance@v3
        with:
          cache-map: '{"docker-ccache": "/ccache"}'
          skip-extraction: ${{ steps.ccache.outputs.cache-hit }}
      - name: Build image (cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: panmap:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test
        run: |
          docker run --rm panmap:ci --version
          docker run --rm panmap:ci --help
