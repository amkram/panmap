# Conda environment for building panmap from source (no system-level installs).
#   conda env create -f environment.yml
#   conda activate panmap
#   cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
#   cmake --build build -j
# The binary is at build/bin/panmap.
# In an active conda env the build auto-detects and uses the conda libraries.
name: panmap
channels:
  - conda-forge
  - bioconda
dependencies:
  - cmake
  - make
  - compilers
  - pkg-config
  - git
  - libprotobuf
  - capnproto
  - htslib
  - libboost-devel
  - tbb-devel
  - libabseil
  - jsoncpp
  - spdlog
  - fmt
  - zstd
  - libdeflate
  - zlib
  - eigen
