{% set name = "panmap" %}
{% set version = "0.1.0" %}
{% set panman_version = "0.1.4" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  - url: https://github.com/amkram/panmap/archive/v{{ version }}.tar.gz
    sha256: 43b852a7eae2c64ce68b555751070492b958386d06e12bd61807ad46126292c2
    folder: panmap
  - url: https://github.com/TurakhiaLab/panman/archive/refs/tags/v{{ panman_version }}.tar.gz
    sha256: 6e987799cd4f713f88b6e3ddafa9b59798a210c8ff1d8b59381bbc5fd2661c72
    folder: panman

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - cmake
    - make
    - autoconf
    - automake
    - libtool
  host:
    - zlib
    - boost-cpp
    - libprotobuf
    - tbb-devel
    - capnproto >=1.0
    - jsoncpp
    - spdlog
    - zstd
    - libdeflate
    - eigen

  run:
    - libboost

test:
  commands:
    - panmap --help

about:
  home: "https://github.com/amkram/panmap"
  license: "MIT"
  license_family: MIT
  license_file: "panmap/LICENSE"
  summary: "Pangenome-based sequence placement, alignment, and genotyping"
  dev_url: "https://github.com/amkram/panmap"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
