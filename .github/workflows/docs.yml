name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# gh-deploy force-pushes the built site to the gh-pages branch.
permissions:
  contents: write

concurrency:
  group: docs-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so the net docs-diff below is accurate
      # `on.push.paths` above evaluates every commit in the push individually, so a
      # merge whose feature branch ever touched docs/ triggers even when the merge
      # changes no docs on net. Gate the deploy on the NET diff (before..after) --
      # for a merge that is exactly the PR's net changes -- so unrelated code merges
      # don't publish the site.
      - name: Detect docs changes
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          base="${{ github.event.before }}"
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ] \
             || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            echo "changed=true" >> "$GITHUB_OUTPUT"; exit 0    # unknown base -> deploy to be safe
          fi
          if git diff --name-only "$base" "${{ github.sha }}" \
               | grep -qE '^(docs/|\.github/workflows/docs\.yml$)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No net docs/ changes in ${base}..${{ github.sha }} -- skipping deploy."
          fi
      - uses: actions/setup-python@v5
        if: steps.gate.outputs.changed == 'true'
        with:
          python-version: '3.12'
      - name: Build and publish to gh-pages
        if: steps.gate.outputs.changed == 'true'
        run: |
          pip install mkdocs-material
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdocs gh-deploy --force -f docs/mkdocs.yml
